<!doctype html>
<html lang="ja">
  
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>読み上げプレーヤー</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #d1d5db;
      --accent: #0f766e;
      --accent2: #134e4a;
      --active-bg: #ecfdf5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f0fdf4);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* === 初期画面: ファイル選択 === */
    .select-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
    }
    .select-screen h1 {
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 4px;
    }
    .select-screen .status-text {
      font-size: 14px;
      color: var(--sub);
      text-align: center;
    }

    /* フォルダツリー */
    .file-tree {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .folder-group {
      margin-bottom: 6px;
    }
    .folder-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #f0fdf4;
      border: 1px solid #d1fae5;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent2);
      user-select: none;
      -webkit-user-select: none;
    }
    .folder-header .folder-icon { font-size: 18px; }
    .folder-header .folder-path {
      flex: 1;
      word-break: break-word;
    }
    .folder-header .toggle-icon {
      font-size: 12px;
      color: var(--sub);
      transition: transform 0.2s;
    }
    .folder-group.open .toggle-icon {
      transform: rotate(90deg);
    }
    .folder-files {
      display: none;
      padding: 4px 0 4px 16px;
    }
    .folder-group.open .folder-files {
      display: block;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin: 3px 0;
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }
    .file-item:active {
      background: var(--active-bg);
      border-color: var(--accent);
    }
    .file-item .file-icon { font-size: 16px; color: var(--sub); }
    .file-item .file-name { flex: 1; }

    /* ルート直下のファイル（フォルダなし） */
    .root-file {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin: 3px 0;
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
    }
    .root-file:active {
      background: var(--active-bg);
      border-color: var(--accent);
    }

    /* === 再生画面: 全画面テキスト表示 === */
    .player-screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .player-screen.active {
      display: flex;
    }

    /* 上部バー */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--card);
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .top-bar button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .top-bar .back-btn {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent2);
    }
    .top-bar .file-name {
      flex: 1;
      font-size: 13px;
      color: var(--sub);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .top-bar .progress {
      font-size: 13px;
      color: var(--sub);
      white-space: nowrap;
    }

    /* 速度ボタン群 */
    .rate-bar {
      display: flex;
      gap: 6px;
      padding: 6px 12px;
      background: #fafbfc;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }
    .rate-bar button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .rate-bar button.active {
      background: #d1fae5;
      border-color: #10b981;
      color: #065f46;
      font-weight: 700;
    }
    .rate-bar .prev-btn {
      margin-left: auto;
      background: #fef3c7;
      border-color: #f59e0b;
      color: #92400e;
    }

    /* テキスト本文エリア */
    .text-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      -webkit-overflow-scrolling: touch;
    }
    .text-area ol {
      list-style: none;
      padding: 0;
    }
    .text-area li {
      padding: 8px 10px;
      margin: 2px 0;
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .text-area li.active {
      background: var(--active-bg);
      color: var(--accent2);
      font-weight: 700;
      border-left: 4px solid var(--accent);
    }
    .text-area li.done {
      color: var(--sub);
    }

    /* 下部バー */
    .bottom-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: var(--card);
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .bottom-bar button {
      flex: 1;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
    }
    .bottom-bar .first-btn {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent2);
    }
  </style>
</head>
<body>

  <!-- ファイル選択画面 -->
  <div class="select-screen" id="selectScreen">
    <h1>📖 読み上げプレーヤー</h1>
    <div class="status-text" id="statusSelect">GitHubからファイルリストを取得中...</div>
    <div class="file-tree" id="fileTree"></div>
  </div>

  <!-- 再生画面 -->
  <div class="player-screen" id="playerScreen">
    <div class="top-bar">
      <button type="button" class="back-btn" id="backBtn">← ファイル選択</button>
      <span class="file-name" id="fileName"></span>
      <span class="progress" id="progressText"></span>
    </div>
    <div class="rate-bar">
      <button type="button" class="rate" id="rate1Btn">1x</button>
      <button type="button" class="rate" id="rate15Btn">1.5x</button>
      <button type="button" class="rate" id="rate2Btn">2x</button>
      <button type="button" class="prev-btn" id="prevBtn">◀ 1つ前</button>
    </div>
    <div class="text-area" id="textArea">
      <ol id="lineList"></ol>
    </div>
    <div class="bottom-bar">
      <button type="button" class="first-btn" id="firstBtn">⏮ 最初へ戻る</button>
    </div>
  </div>

  <script>
    const selectScreen = document.getElementById('selectScreen');
    const playerScreen = document.getElementById('playerScreen');
    const fileTree = document.getElementById('fileTree');
    const backBtn = document.getElementById('backBtn');
    const fileNameEl = document.getElementById('fileName');
    const progressText = document.getElementById('progressText');
    const firstBtn = document.getElementById('firstBtn');
    const prevBtn = document.getElementById('prevBtn');
    const rate1Btn = document.getElementById('rate1Btn');
    const rate15Btn = document.getElementById('rate15Btn');
    const rate2Btn = document.getElementById('rate2Btn');
    const statusSelect = document.getElementById('statusSelect');
    const lineListEl = document.getElementById('lineList');
    const textArea = document.getElementById('textArea');

    const synth = window.speechSynthesis;

    let lines = [];
    let currentIndex = -1;
    let currentRate = 1.5;
    let speaking = false;

    function updateProgress() {
      if (currentIndex < 0) {
        progressText.textContent = `0/${lines.length}`;
      } else {
        progressText.textContent = `${currentIndex + 1}/${lines.length}`;
      }
    }

    function renderList() {
      lineListEl.innerHTML = '';
      lines.forEach((line, idx) => {
        const li = document.createElement('li');
        li.textContent = line;
        if (idx === currentIndex) {
          li.classList.add('active');
        } else if (idx < currentIndex) {
          li.classList.add('done');
        }
        lineListEl.appendChild(li);
      });
      if (currentIndex >= 0) {
        const activeLi = lineListEl.children[currentIndex];
        if (activeLi) {
          activeLi.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
    }

    function setRate(rate) {
      currentRate = rate;
      rate1Btn.classList.toggle('active', rate === 1);
      rate15Btn.classList.toggle('active', rate === 1.5);
      rate2Btn.classList.toggle('active', rate === 2);
    }

    function getDefaultJaVoice() {
      const voices = synth.getVoices();
      return voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ja')) || null;
    }

    function stopSpeak() {
      synth.cancel();
      speaking = false;
    }

    function speakLine(index) {
      if (index < 0 || index >= lines.length) return;
      stopSpeak();
      currentIndex = index;
      renderList();
      updateProgress();

      const text = lines[index];
      const utt = new SpeechSynthesisUtterance(text);
      const voice = getDefaultJaVoice();
      if (voice) {
        utt.voice = voice;
        utt.lang = voice.lang;
      } else {
        utt.lang = 'ja-JP';
      }
      utt.rate = currentRate;
      utt.onstart = () => { speaking = true; };
      utt.onend = () => { speaking = false; };
      utt.onerror = () => { speaking = false; };
      synth.speak(utt);
    }

    function playFromFirst() {
      if (!lines.length) return;
      speakLine(0);
    }

    function playPrevious() {
      if (!lines.length) return;
      if (currentIndex === -1) { playFromFirst(); return; }
      speakLine(Math.max(0, currentIndex - 1));
    }

    function playNext() {
      if (!lines.length) return;
      if (currentIndex === -1) { playFromFirst(); return; }
      const next = currentIndex + 1;
      if (next >= lines.length) { stopSpeak(); return; }
      speakLine(next);
    }

    function showSelectScreen() {
      stopSpeak();
      selectScreen.style.display = 'flex';
      playerScreen.classList.remove('active');
    }

    function showPlayerScreen(displayName) {
      selectScreen.style.display = 'none';
      playerScreen.classList.add('active');
      fileNameEl.textContent = displayName;
      updateProgress();
    }

    function canHandleTapTarget(target) {
      return !(target && (
        target.tagName === 'INPUT' ||
        target.tagName === 'SELECT' ||
        target.tagName === 'BUTTON' ||
        target.closest('button') ||
        target.closest('select') ||
        target.closest('input') ||
        target.closest('.file-item') ||
        target.closest('.root-file') ||
        target.closest('.folder-header')
      ));
    }

    // ファイルを読み込んで再生画面へ
    function loadFile(filePath) {
      statusSelect.textContent = 'ファイルをダウンロード中...';
      const fileUrl = rawBase + encodeURI(filePath);
      fetch(fileUrl)
        .then(res => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.text();
        })
        .then(text => {
          lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
          stopSpeak();
          currentIndex = -1;

          const displayName = filePath.replace(/^読み上げデータ\//, '');
          if (!lines.length) {
            statusSelect.textContent = 'ファイル内に読み上げ対象の行がありません。';
            return;
          }
          renderList();
          showPlayerScreen(displayName);
        })
        .catch(err => {
          statusSelect.textContent = '読み込み失敗: ' + err.message;
          console.error(err);
        });
    }

    // フォルダツリーを構築
    function buildFileTree(files) {
      // 階層ツリー構造を構築
      const tree = {};
      files.forEach(file => {
        const rel = file.replace(/^読み上げデータ\//, '');
        const parts = rel.split('/');
        let node = tree;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!node[parts[i]]) node[parts[i]] = {};
          node = node[parts[i]];
        }
        // ファイル名を _files 配列に格納
        if (!node._files) node._files = [];
        node._files.push({ name: parts[parts.length - 1], path: file });
      });

      fileTree.innerHTML = '';
      renderTree(tree, fileTree, []);
    }

    function renderTree(node, container, pathParts) {
      // まずフォルダを表示
      const folders = Object.keys(node).filter(k => k !== '_files').sort((a, b) =>
        a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' })
      );

      folders.forEach(folderName => {
        const fullPath = [...pathParts, folderName];
        const group = document.createElement('div');
        group.className = 'folder-group open';

        const header = document.createElement('div');
        header.className = 'folder-header';
        header.innerHTML = `
          <span class="folder-icon">📁</span>
          <span class="folder-path">${fullPath.join(' / ')}</span>
          <span class="toggle-icon">▶</span>
        `;
        header.addEventListener('click', () => {
          group.classList.toggle('open');
        });

        const filesContainer = document.createElement('div');
        filesContainer.className = 'folder-files';

        group.appendChild(header);
        group.appendChild(filesContainer);
        container.appendChild(group);

        // 再帰的にサブフォルダとファイルを表示
        renderTree(node[folderName], filesContainer, fullPath);
      });

      // ファイルを表示
      if (node._files) {
        node._files.sort((a, b) =>
          a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' })
        );
        node._files.forEach(file => {
          const item = document.createElement('div');
          item.className = pathParts.length > 0 ? 'file-item' : 'root-file';
          item.innerHTML = `<span class="file-icon">📄</span><span class="file-name">${file.name}</span>`;
          item.addEventListener('click', () => loadFile(file.path));
          container.appendChild(item);
        });
      }
    }

    // GitHub APIを使用してファイルリストを動的に取得
    const owner = 'naokiminakata';
    const repo = '2603yomiage_simple';
    const branch = 'main';
    const rawBase = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/`;

    fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`)
      .then(res => {
        if (!res.ok) throw new Error('GitHub APIへの通信に失敗しました');
        return res.json();
      })
      .then(data => {
        if (!data.tree) throw new Error('ツリーデータが見つかりません');

        const files = data.tree
          .filter(item => item.type === 'blob' && item.path.startsWith('読み上げデータ/') && item.path.endsWith('.txt'))
          .map(item => item.path);

        files.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

        if (files.length > 0) {
          statusSelect.textContent = 'ファイルをタップして読み込みます。';
          buildFileTree(files);
        } else {
          statusSelect.textContent = '「読み上げデータ」フォルダ内にテキストファイルが見つかりません。';
        }
      })
      .catch(err => {
        statusSelect.textContent = 'エラー: ' + err.message;
        console.error(err);
      });

    backBtn.addEventListener('click', showSelectScreen);
    firstBtn.addEventListener('click', playFromFirst);
    prevBtn.addEventListener('click', playPrevious);
    rate1Btn.addEventListener('click', () => setRate(1));
    rate15Btn.addEventListener('click', () => setRate(1.5));
    rate2Btn.addEventListener('click', () => setRate(2));

    window.addEventListener('keydown', (event) => {
      if (event.code !== 'Space') return;
      if (!playerScreen.classList.contains('active')) return;
      const target = event.target;
      const isTyping = target && (
        target.tagName === 'INPUT' ||
        target.tagName === 'SELECT' ||
        target.isContentEditable
      );
      if (isTyping) return;
      event.preventDefault();
      playNext();
    }, true);

    document.addEventListener('pointerup', (event) => {
      if (!playerScreen.classList.contains('active')) return;
      if (!lines.length) return;
      if (!canHandleTapTarget(event.target)) return;
      playNext();
    });

    setRate(1.5);
  </script>
</body>
</html>
